services:

  # Simulated developer workstation — both the KB agent and the security
  # engineer portal run as sibling processes inside this single container.
  # Same OS, same filesystem, different credential scope per process.
  # See workspace/entrypoint.sh for how credential isolation is implemented.
  workspace:
    build: ./workspace
    ports:
      - "8000:8000"   # KB agent (Chainlit UI)
      - "8001:8001"   # Security engineer portal (FastAPI)
      - "8002:8002"   # KB agent debug (env scope check)
    environment:
      # Machine account tokens — one per principal identity.
      # KB_BWS_TOKEN: scoped to kb-agent machine account in BWS.
      # SECURITY_ENGINEER_BWS_TOKEN: scoped to security-engineer machine account.
      # entrypoint.sh sets BWS_ACCESS_TOKEN per process and strips the engineer
      # token from the KB agent environment.
      - KB_BWS_TOKEN=${KB_BWS_TOKEN}
      - SECURITY_ENGINEER_BWS_TOKEN=${SECURITY_ENGINEER_BWS_TOKEN}
      - BWS_ORGANIZATION_ID=${BWS_ORGANIZATION_ID}
      # Structural config
      - AVP_POLICY_STORE_ID=${AVP_POLICY_STORE_ID}
      - AWS_REGION=${AWS_REGION}
      # AWS credentials injected by `bws run` on the host — not in .env
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db-incidents

  # Single incidents database — same table, two access levels via AVP
  db-incidents:
    image: postgres:16
    environment:
      POSTGRES_DB: incidents
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_INCIDENTS_PASSWORD}
    volumes:
      - ./postgres/init/incidents.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  default:
    driver: bridge
